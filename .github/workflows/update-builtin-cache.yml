name: Update Built-in Policy Cache

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2:00 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install azure-identity azure-mgmt-resource

      - name: Fetch built-in policies from Azure
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: python scripts/fetch_builtins.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/builtin-policies.json data/cache-meta.json
          git diff --staged --quiet || git commit -m "chore: update built-in policy cache [skip ci]"
          git push
